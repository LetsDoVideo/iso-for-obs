name: Build and Release

permissions:
  actions: read
  contents: write
  security-events: write

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build ISO for OBS
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          install-deps: 'true'

      - name: Configure and Build
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Assemble Drop-in ZIP
        shell: pwsh
        run: |
          # Plugin files -> obs-plugins/64bit/
          New-Item -ItemType Directory -Force -Path "dist/obs-plugins/64bit"
          Copy-Item "build/Release/iso-for-obs.dll" -Destination "dist/obs-plugins/64bit/"
          Copy-Item "build/Release/iso-for-obs.pdb" -Destination "dist/obs-plugins/64bit/"

          # Locale file -> data/obs-plugins/iso-for-obs/locale/
          New-Item -ItemType Directory -Force -Path "dist/data/obs-plugins/iso-for-obs/locale"
          Copy-Item "data/locale/en-US.ini" -Destination "dist/data/obs-plugins/iso-for-obs/locale/"

          # Zoom SDK runtime files -> bin/64bit/ (flat)
          New-Item -ItemType Directory -Force -Path "dist/bin/64bit"
          Get-ChildItem "zoom-sdk/bin" -File | Copy-Item -Destination "dist/bin/64bit/"

          # Zoom SDK language subfolder -> bin/64bit/language/
          New-Item -ItemType Directory -Force -Path "dist/bin/64bit/language"
          Copy-Item "zoom-sdk/bin/language/*" -Destination "dist/bin/64bit/language/"

          # Zoom SDK ringtone subfolder -> bin/64bit/ringtone/
          New-Item -ItemType Directory -Force -Path "dist/bin/64bit/ringtone"
          Copy-Item "zoom-sdk/bin/ringtone/*" -Destination "dist/bin/64bit/ringtone/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISO-for-OBS-Windows
          path: dist/
